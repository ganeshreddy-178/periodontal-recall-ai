name: CI — Periodontal Recall AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-flask

      - name: Run tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci-pipeline-32chars
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-pipeline-32
        run: |
          cd backend
          pytest tests/ -v --tb=short -W ignore::DeprecationWarning

      - name: Validate project structure
        run: |
          python -c "
          import os
          required = [
            'backend/run.py',
            'backend/requirements.txt',
            'backend/app/__init__.py',
            'backend/app/api/auth.py',
            'backend/app/api/patients.py',
            'backend/app/api/predict.py',
            'backend/app/api/dashboard.py',
            'backend/app/services/ai_service.py',
            'database/schema.sql',
            'ACTIVITY_LOG.md',
          ]
          for f in required:
            assert os.path.exists(f), f'Missing: {f}'
            print(f'OK: {f}')
          print('All required files present.')
          "
