name: CI — Periodontal Recall AI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-flask

      - name: Run tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: test-secret-key-for-ci-pipeline
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-pipeline
        run: |
          cd backend
          pytest tests/ -v --tb=short

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Run lint check
        run: |
          flake8 backend/app/ --max-line-length=200 --ignore=E501,W503,E302,E303,W291,W293,E226,E231,E241,E251,F401,W605,E711,E712,W391,E261,E265,E266,E401,E402,C901 --count --statistics
