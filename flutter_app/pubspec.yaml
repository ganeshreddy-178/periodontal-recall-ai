name: periodontal_recall_ai
description: AI-Powered Smart Dental Risk Prediction & Personalized Recall System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.1

  # Storage
  flutter_secure_storage: ^9.0.0

  # Image
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.67.0

  # UI
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
