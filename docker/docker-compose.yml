version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: periodontal_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: periodontal_recall_ai
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: periodontal_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.example
    environment:
      DB_HOST: db
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: periodontal_recall_ai
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
      - model_data:/app/ai_module/models_saved
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: periodontal_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
  uploads_data:
  model_data:
